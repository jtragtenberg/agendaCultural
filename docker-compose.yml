services:
  postgres:
    image: postgres:16-alpine
    container_name: agenda_cultural_postgres
    environment:
      POSTGRES_DB: agenda_cultural
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - dados_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agenda_cultural']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: agenda_cultural_backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenda_cultural
      PORTA: 3000
      JWT_SEGREDO: segredo-docker-local
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: agenda_cultural_frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  dados_postgres:
  backend_node_modules:
  frontend_node_modules:
